name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check src tests
      - name: Unit tests
        run: uv run pytest tests/unit -q

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --locked
      - name: Start disposable Scanopy (pinned to the verified release)
        run: docker compose -f .github/scanopy-ci/docker-compose.yml up -d --wait
      - name: Bootstrap org/network/API key
        run: bash .github/scanopy-ci/bootstrap.sh
        env:
          SCANOPY_BASE_URL: http://localhost:60072
      - name: Integration tests
        run: uv run pytest tests/integration -q
        env:
          SCANOPY_BASE_URL: http://localhost:60072
          # SCANOPY_API_KEY / SCANOPY_NETWORK_ID come from bootstrap via GITHUB_ENV
      - name: Scanopy logs on failure
        if: failure()
        run: docker compose -f .github/scanopy-ci/docker-compose.yml logs --tail 100
      - name: Tear down
        if: always()
        run: docker compose -f .github/scanopy-ci/docker-compose.yml down -v
